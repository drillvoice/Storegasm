<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e293b" />
    <title>Storegasm — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        background: #ffffff;
        color: #0f172a;
        padding: 1.5rem;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin-bottom: 1.5rem;
        background: #1e293b;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg { width: 36px; height: 36px; }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { font-size: 0.9375rem; color: #64748b; max-width: 280px; margin-bottom: 1.5rem; }
      button {
        padding: 0.5rem 1.25rem;
        background: #1e293b;
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #334155; }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="10" width="28" height="22" rx="2" stroke="white" stroke-width="2.5"/>
        <path d="M4 16h28" stroke="white" stroke-width="2"/>
        <path d="M12 4h12v6H12z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </body>
</html>
